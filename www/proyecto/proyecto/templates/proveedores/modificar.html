{% extends "index.html" %}
{% load static %}

{% block extra_css %}
    <title>Modificar Proveedor</title>
    <link rel="stylesheet" href="{% static 'css/alta.css' %}">
{% endblock %}

{% block contenido %}
    <h2>Modificar Proveedor</h2>
    
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ proveedor.id }}">

        <label for="nombre">Nombre del proveedor:</label>
        <input type="text" id="nombre" name="nombre" value="{{ proveedor.nombre }}" required>

        <label for="cif">CIF/NIF:</label>
        <input type="text" id="cif" name="cif" value="{{ proveedor.cif }}" required>

        <label for="direccion">Dirección:</label>
        <textarea id="direccion" name="direccion" rows="2">{{ proveedor.direccion|default:'' }}</textarea>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" value="{{ proveedor.telefono|default:'' }}">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ proveedor.email|default:'' }}">

        <label for="web">Sitio web:</label>
        <input type="url" id="web" name="web" value="{{ proveedor.web|default:'' }}">

        <label for="contacto">Persona de contacto:</label>
        <input type="text" id="contacto" name="contacto" value="{{ proveedor.contacto|default:'' }}">

        <label for="notas">Notas adicionales:</label>
        <textarea id="notas" name="notas" rows="3">{{ proveedor.notas|default:'' }}</textarea>

        <button type="submit" class="neon-btn">Actualizar Proveedor</button>
        <a href="{% url 'proveedores_url' %}" class="neon-link">Cancelar</a>
    </form>
{% endblock %}
