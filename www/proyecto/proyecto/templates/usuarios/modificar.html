{% extends "index.html" %}
{% load static %}

{% block extra_css %}
    <title>Modificar Cliente</title>
    <link rel="stylesheet" href="{% static 'css/alta.css' %}">
{% endblock %}

{% block contenido %}
    <h2>Modificar Cliente</h2>
    
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ cliente.id }}">

        <!-- Nombre -->
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" value="{{ cliente.nombre }}" required>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ cliente.email }}" required>

        <!-- Teléfono -->
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" value="{{ cliente.telefono|default:'' }}">

        <!-- Dirección -->
        <label for="direccion">Dirección:</label>
        <textarea id="direccion" name="direccion" rows="3">{{ cliente.direccion|default:'' }}</textarea>

        <!-- Botones -->
        <button type="submit" class="neon-btn">Actualizar Cliente</button>
        <a href="{% url 'usuarios_url' %}" class="neon-link">Cancelar</a>
    </form>
{% endblock %}
