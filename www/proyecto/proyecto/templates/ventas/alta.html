{% extends "index.html" %}
{% load static %}

{% block extra_css %}
    <title>Nueva Venta</title>
    <link rel="stylesheet" href="{% static 'css/alta.css' %}">
    <link rel="stylesheet" href="{% static 'css/ventas.css' %}">
{% endblock %}

{% block contenido %}
    <h2>Registrar Nueva Venta</h2>
    
    <form method="post" id="venta-form">
        {% csrf_token %}

        <!-- Cliente -->
        <label for="cliente">Cliente:</label>
        <select id="cliente" name="cliente" required>
            <option value="">-- Seleccione un cliente --</option>
            {% for cliente in clientes %}
                <option value="{{ cliente.id }}">{{ cliente.nombre }}</option>
            {% endfor %}
        </select>

        <!-- Producto -->
        <label for="producto">Producto:</label>
        <select id="producto" name="producto" required>
            <option value="">-- Seleccione un producto --</option>
            {% for producto in productos %}
                <option value="{{ producto.id }}" data-precio="{{ producto.precio }}">
                    {{ producto.nombre }} - ${{ producto.precio }} (Stock: {{ producto.stock }})
                </option>
            {% endfor %}
        </select>

        <!-- Cantidad -->
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" min="1" required>

	<!-- Fecha (Si se deja vacío es current date) -->
        <label for="fecha">Fecha de venta:</label>
        <input type="date" id="fecha" name="fecha" value="{% now 'Y-m-d' %}">
        <small style="color: var(--neon-cyan);">(Si se deja vacío, se usará la fecha actual)</small>

        <!-- Información del precio (se actualizará con JS) -->
        <div class="precio-info" id="info-precio">
            Precio unitario: $0.00 | Total: $0.00
        </div>

        <!-- Botón de enviar -->
        <button type="submit" class="neon-btn">Registrar Venta</button>
    </form>
    
    <br>
    <a href="{% url 'ventas_url' %}" class="neon-link">← Volver al listado</a>

    <!-- JavaScript para calcular total en tiempo real -->
    <script>
        const productoSelect = document.getElementById('producto');
        const cantidadInput = document.getElementById('cantidad');
        const infoPrecio = document.getElementById('info-precio');

        function actualizarPrecio() {
            const selectedOption = productoSelect.options[productoSelect.selectedIndex];
            if (selectedOption && selectedOption.value) {
                const precio = parseFloat(selectedOption.dataset.precio) || 0;
                const cantidad = parseInt(cantidadInput.value) || 0;
                const total = precio * cantidad;
                infoPrecio.textContent = `Precio unitario: $${precio.toFixed(2)} | Total: $${total.toFixed(2)}`;
            } else {
                infoPrecio.textContent = `Precio unitario: $0.00 | Total: $0.00`;
            }
        }

        productoSelect.addEventListener('change', actualizarPrecio);
        cantidadInput.addEventListener('input', actualizarPrecio);
    </script>
{% endblock %}
